    <style>
        .hero-carousel {
        height: 60vh;
        width: 100%;
        overflow: hidden;
        }
        .swiper-slide {
        background-size: cover;
        background-position: center;
        height: 100%;
        }
        .carousel-track {
        display: flex;
        height: 100%;
        transition: transform 0.8s ease-in-out;
        will-change: transform;
        }
        .carousel-slide {
        flex: 0 0 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        }
        .slide-content {
        position: relative;
        z-index: 2;
        text-align: center;
        color: white;
        max-width: 800px;
        padding: 1rem 2rem 3rem; /* bottom padding to not overlap dots */
        }
        
        .carousel-dots {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 3;
        }
        .carousel-dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.3s ease;
        }
        .carousel-dot.active {
        background: white;
        transform: scale(1.2);
        }
